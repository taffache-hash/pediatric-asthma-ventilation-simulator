schema_version: '0.3'
scenario_id: post_intubation_collapse
title: Post-intubation collapse after aggressive ventilation
category: peri_intubation_risk
duration_min: 20
time_step_s: 2
patient:
  age_years: 6
  weight_kg: 20
  frc_ml_per_kg: 25
  vco2_ml_kg_min: 6.0
  dead_space_ml_kg: 2.4
  map_baseline_mmHg: 58
  preload_status: low
  patient_effort: passive_after_sedation
airway_mechanics:
  obstruction_severity: critical
  raw_insp_cmH2O_s_L: 55
  raw_exp_multiplier: 2.0
  crs_ml_cmH2O_kg: 0.9
  secretions_factor: 1.3
  heterogeneity_factor: 1.5
ventilator:
  mode: MANUAL_BAGGING_THEN_VCV
  vt_ml_kg: 10.0
  rr_bpm: 28
  peep_cmH2O: 5
  ie_ratio: '1:2'
  insp_flow_l_min: 40
  inspiratory_pause_s: 0.2
therapies:
  continuous_albuterol: true
  ipratropium: true
  magnesium:
    enabled: true
    bolus_mg_kg: 50
  ketamine:
    enabled: false
  steroid:
    enabled: true
    minutes_since_first_dose: 30
expected_direction:
  autopeep: rapidly_rises
  pplat: critical
  map: critical_fall
  paco2: remains_high
  risk: peri_intubation_arrest_warning
educational_message: Aggressive bagging in an obstructed, low-preload child can convert
  respiratory failure into cardiovascular collapse.
